<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yao Business Skill Report</title>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --ink: #111111;
        --muted: #5f6368;
        --line: #e7e7e7;
        --accent: #111111;
        --accent-soft: #f3f4f6;
        --good: #117a4f;
        --warn: #b76b1f;
        --bad: #c73b2d;
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.05);
        --radius: 24px;
        --nav-height: 72px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "SF Pro SC", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 60;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid rgba(17, 17, 17, 0.08);
        backdrop-filter: blur(16px);
      }

      .topbar-inner {
        width: min(1280px, calc(100vw - 32px));
        min-height: var(--nav-height);
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 18px;
        align-items: center;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .brand-mark {
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .brand-name {
        font-size: 16px;
        font-weight: 700;
      }

      .nav {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .nav::-webkit-scrollbar {
        display: none;
      }

      .nav-link {
        flex: 0 0 auto;
        padding: 10px 14px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .nav-link:hover,
      .nav-link.active {
        background: var(--accent-soft);
        color: var(--ink);
      }

      .lang-toggle {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .lang-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .lang-btn.active {
        background: var(--ink);
        color: #ffffff;
      }

      .page {
        width: min(1280px, calc(100vw - 32px));
        margin: 24px auto 72px;
      }

      .anchor {
        scroll-margin-top: calc(var(--nav-height) + 20px);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.35fr 0.95fr;
        gap: 18px;
        margin-bottom: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero-main {
        padding: 34px 36px;
        min-height: 280px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 8px 13px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        line-height: 1.08;
        font-family: "Songti SC", "Noto Serif SC", Georgia, serif;
      }

      h1 {
        margin-top: 18px;
        font-size: clamp(34px, 4vw, 58px);
      }

      h2 {
        font-size: 28px;
      }

      h3 {
        font-size: 18px;
      }

      h4 {
        font-size: 15px;
      }

      .subhead {
        max-width: 64ch;
        margin-top: 16px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.8;
      }

      .hero-meta {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .meta-pill {
        padding: 10px 12px;
        border-radius: 14px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      .hero-side {
        display: grid;
        gap: 18px;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 18px;
      }

      .kpi {
        padding: 16px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .kpi-label {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .kpi-value {
        margin-top: 10px;
        font-size: 27px;
        font-weight: 700;
      }

      .section-grid {
        display: grid;
        gap: 18px;
      }

      .two-col {
        grid-template-columns: 1.1fr 0.9fr;
      }

      .section {
        padding: 26px 28px;
      }

      .section + .section {
        margin-top: 0;
      }

      .module-title {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-end;
        margin-bottom: 18px;
      }

      .module-title p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .section-note {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.8;
      }

      .card-grid {
        display: grid;
        gap: 12px;
      }

      .card-grid.three {
        grid-template-columns: repeat(3, 1fr);
      }

      .card-grid.two {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-stack {
        display: grid;
        gap: 12px;
      }

      .card {
        padding: 16px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .card-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .muted {
        color: var(--muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #ffffff;
        font-size: 13px;
        line-height: 1.4;
      }

      .label {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .label-good {
        background: rgba(17, 122, 79, 0.11);
        color: var(--good);
      }

      .label-warn {
        background: rgba(183, 107, 31, 0.12);
        color: var(--warn);
      }

      .label-bad {
        background: rgba(199, 59, 45, 0.11);
        color: var(--bad);
      }

      .score-row {
        display: grid;
        grid-template-columns: 96px 1fr 52px;
        gap: 12px;
        align-items: center;
        margin-top: 12px;
      }

      .score-row:first-child {
        margin-top: 0;
      }

      .scorebar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #ececec;
        overflow: hidden;
      }

      .scorebar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #bdbdbd, #111111);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        font-size: 14px;
        line-height: 1.65;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .empty {
        padding: 18px;
        border: 1px dashed var(--line);
        border-radius: 18px;
        color: var(--muted);
        background: #fcfcfc;
      }

      .method-list {
        display: grid;
        gap: 12px;
      }

      .method-item {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
      }

      .formula-box {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #ffffff;
        font-family: "SFMono-Regular", "Menlo", "Monaco", Consolas, monospace;
        font-size: 13px;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 980px) {
        .topbar-inner,
        .page {
          width: min(1280px, calc(100vw - 20px));
        }

        .hero,
        .two-col,
        .card-grid.three,
        .card-grid.two {
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          grid-template-columns: 1fr;
          padding: 12px 0;
        }
      }
    </style>
  </head>

      function safeArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function ui() {
        return UI[currentLang];
      }

      function fallbackText() {
        return ui().labels.notProvided;
      }

      function localize(value, fallback = "") {
        if (value && typeof value === "object" && !Array.isArray(value)) {
          if (currentLang === "zh" && value.zh) return String(value.zh);
          if (currentLang === "en" && value.en) return String(value.en);
          if (value.zh) return String(value.zh);
          if (value.en) return String(value.en);
        }
        if (value === null || value === undefined || value === "") return fallback;
        return String(value);
      }

      function looksLikeToken(value) {
        return typeof value === "string" && /^[A-Za-z0-9_]+$/.test(value);
      }

      function humanizeToken(value) {
        return String(value).replace(/_/g, " ");
      }

      function tokenLabel(value) {
        const raw = localize(value, "");
        if (!raw) return fallbackText();
        const maps = ui().maps.token || {};
        if (maps[raw]) return maps[raw];
        if (looksLikeToken(raw)) return humanizeToken(raw);
        return raw;
      }

      function mappedLabel(group, value, fallback = "") {
        const raw = localize(value, fallback);
        if (!raw) return fallback || fallbackText();
        const maps = ui().maps[group] || {};
        return maps[raw] || tokenLabel(raw);
      }

      function escapeHtml(value) {
        const string = localize(value, "");
        return string.replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[ch]);
      }

      function currencyRange(range) {
        if (!range) return fallbackText();
        const currency = localize(range.currency, "");
        return `${currency} ${range.low ?? "-"} / ${range.base ?? "-"} / ${range.high ?? "-"}`;
      }

      function labelClass(value) {
        const raw = localize(value, "").toLowerCase();
        if (raw === "low" || raw === "good") return "label-good";
        if (raw === "high" || raw === "critical" || raw === "bad") return "label-bad";
        return "label-warn";
      }

      function chips(items, mode = "text") {
        const list = safeArray(items);
        if (!list.length) return `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;
        return list.map((item) => {
          const text = mode === "token" ? tokenLabel(item) : localize(item, fallbackText());
          return `<span class="chip">${escapeHtml(text)}</span>`;
        }).join("");
      }

      function bindLanguageToggle() {
        document.querySelectorAll(".lang-btn").forEach((button) => {

            renderApp();
          });
        });
      }

      function bindScrollSpy() {
        const links = [...document.querySelectorAll(".nav-link")];
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            links.forEach((link) => link.classList.toggle("active", link.dataset.target === entry.target.id));
          });
        }, {
          rootMargin: "-25% 0px -60% 0px",
          threshold: 0.01
        });

        links.forEach((link) => {
          const section = document.getElementById(link.dataset.target);
          if (section) observer.observe(section);
        });
      }

        renderModelsOrIdeas();

        renderCompetition();
        renderAiAndRecommendations();
        renderEvidence();
        renderRisksAndNextActions();

      bindLanguageToggle();
      bindScrollSpy();
