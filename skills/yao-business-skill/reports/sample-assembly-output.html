<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yao Business Skill Report</title>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --ink: #111111;
        --muted: #5f6368;
        --line: #e7e7e7;
        --accent: #111111;
        --accent-soft: #f3f4f6;
        --good: #117a4f;
        --warn: #b76b1f;
        --bad: #c73b2d;
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.05);
        --radius: 24px;
        --nav-height: 72px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "SF Pro SC", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 60;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid rgba(17, 17, 17, 0.08);
        backdrop-filter: blur(16px);
      }

      .topbar-inner {
        width: min(1280px, calc(100vw - 32px));
        min-height: var(--nav-height);
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 18px;
        align-items: center;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .brand-mark {
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .brand-name {
        font-size: 16px;
        font-weight: 700;
      }

      .nav {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .nav::-webkit-scrollbar {
        display: none;
      }

      .nav-link {
        flex: 0 0 auto;
        padding: 10px 14px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
        transition: background 0.2s ease, color 0.2s ease;
      }

      .nav-link:hover,
      .nav-link.active {
        background: var(--accent-soft);
        color: var(--ink);
      }

      .lang-toggle {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .lang-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .lang-btn.active {
        background: var(--ink);
        color: #ffffff;
      }

      .page {
        width: min(1280px, calc(100vw - 32px));
        margin: 24px auto 72px;
      }

      .anchor {
        scroll-margin-top: calc(var(--nav-height) + 20px);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.35fr 0.95fr;
        gap: 18px;
        margin-bottom: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero-main {
        padding: 34px 36px;
        min-height: 280px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 8px 13px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        line-height: 1.08;
        font-family: "Songti SC", "Noto Serif SC", Georgia, serif;
      }

      h1 {
        margin-top: 18px;
        font-size: clamp(34px, 4vw, 58px);
      }

      h2 {
        font-size: 28px;
      }

      h3 {
        font-size: 18px;
      }

      h4 {
        font-size: 15px;
      }

      .subhead {
        max-width: 64ch;
        margin-top: 16px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.8;
      }

      .hero-meta {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .meta-pill {
        padding: 10px 12px;
        border-radius: 14px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      .hero-side {
        display: grid;
        gap: 18px;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 18px;
      }

      .kpi {
        padding: 16px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .kpi-label {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .kpi-value {
        margin-top: 10px;
        font-size: 27px;
        font-weight: 700;
      }

      .section-grid {
        display: grid;
        gap: 18px;
      }

      .two-col {
        grid-template-columns: 1.1fr 0.9fr;
      }

      .section {
        padding: 26px 28px;
      }

      .section + .section {
        margin-top: 0;
      }

      .module-title {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-end;
        margin-bottom: 18px;
      }

      .module-title p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .section-note {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.8;
      }

      .card-grid {
        display: grid;
        gap: 12px;
      }

      .card-grid.three {
        grid-template-columns: repeat(3, 1fr);
      }

      .card-grid.two {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-stack {
        display: grid;
        gap: 12px;
      }

      .card {
        padding: 16px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .card-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .muted {
        color: var(--muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #ffffff;
        font-size: 13px;
        line-height: 1.4;
      }

      .label {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .label-good {
        background: rgba(17, 122, 79, 0.11);
        color: var(--good);
      }

      .label-warn {
        background: rgba(183, 107, 31, 0.12);
        color: var(--warn);
      }

      .label-bad {
        background: rgba(199, 59, 45, 0.11);
        color: var(--bad);
      }

      .score-row {
        display: grid;
        grid-template-columns: 96px 1fr 52px;
        gap: 12px;
        align-items: center;
        margin-top: 12px;
      }

      .score-row:first-child {
        margin-top: 0;
      }

      .scorebar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #ececec;
        overflow: hidden;
      }

      .scorebar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #bdbdbd, #111111);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        font-size: 14px;
        line-height: 1.65;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .empty {
        padding: 18px;
        border: 1px dashed var(--line);
        border-radius: 18px;
        color: var(--muted);
        background: #fcfcfc;
      }

      .method-list {
        display: grid;
        gap: 12px;
      }

      .method-item {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
      }

      .formula-box {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #ffffff;
        font-family: "SFMono-Regular", "Menlo", "Monaco", Consolas, monospace;
        font-size: 13px;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .chart-card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
      }

      .chart-card h3 {
        font-size: 17px;
      }

      .chart-card p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .chart-insight {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
        color: var(--ink);
        font-size: 13px;
        line-height: 1.7;
      }

      .chart-bars,
      .chart-heatmap,
      .chart-legend,
      .balance-grid {
        display: grid;
        gap: 10px;
      }

      .chart-bar-row {
        display: grid;
        grid-template-columns: minmax(88px, 126px) 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .chart-bar-label,
      .chart-bar-value {
        font-size: 13px;
      }

      .chart-bar-label {
        color: var(--muted);
      }

      .chart-track {
        position: relative;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: #ececec;
        overflow: hidden;
      }

      .chart-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #a9a9a9, #111111);
      }

      .range-row {
        display: grid;
        gap: 8px;
      }

      .range-track {
        position: relative;
        height: 12px;
        border-radius: 999px;
        background: #ececec;
      }

      .range-segment {
        position: absolute;
        top: 0;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #d4d4d4, #4b5563);
      }

      .range-base {
        position: absolute;
        top: -4px;
        width: 14px;
        height: 20px;
        border-radius: 999px;
        background: #111111;
        transform: translateX(-50%);
      }

      .stacked-track {
        display: flex;
        width: 100%;
        height: 16px;
        overflow: hidden;
        border-radius: 999px;
        background: #ececec;
      }

      .stacked-segment {
        height: 100%;
      }

      .chart-heatmap {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }

      .heatmap-cell {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
      }

      .heatmap-cell strong,
      .balance-item strong {
        display: block;
        font-size: 15px;
      }

      .heatmap-cell span,
      .balance-item span {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .timeline-grid {
        display: flex;
        gap: 14px;
        align-items: flex-end;
        min-height: 170px;
      }

      .timeline-item {
        flex: 1 1 0;
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .timeline-bar {
        width: 100%;
        max-width: 48px;
        border-radius: 14px 14px 0 0;
        background: linear-gradient(180deg, #111111, #9ca3af);
      }

      .timeline-label {
        font-size: 12px;
        color: var(--muted);
      }

      .gap-row {
        display: grid;
        grid-template-columns: minmax(96px, 148px) 1fr;
        gap: 12px;
        align-items: center;
      }

      .gap-track {
        position: relative;
        height: 28px;
      }

      .gap-track::before {
        content: "";
        position: absolute;
        inset: 13px 0 auto 0;
        height: 2px;
        background: #d9d9d9;
      }

      .gap-marker {
        position: absolute;
        top: 6px;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        transform: translateX(-50%);
      }

      .gap-marker.peer {
        background: #9ca3af;
      }

      .gap-marker.current {
        background: #111111;
      }

      .gap-meta {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }

      .quadrant {
        position: relative;
        height: 260px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background:
          linear-gradient(to right, transparent calc(50% - 0.5px), #d9d9d9 calc(50% - 0.5px), #d9d9d9 calc(50% + 0.5px), transparent calc(50% + 0.5px)),
          linear-gradient(to bottom, transparent calc(50% - 0.5px), #d9d9d9 calc(50% - 0.5px), #d9d9d9 calc(50% + 0.5px), transparent calc(50% + 0.5px)),
          #ffffff;
      }

      .quadrant-axis {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .quad-point {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #111111;
        transform: translate(-50%, 50%);
      }

      .quad-point.high-risk {
        background: var(--bad);
      }

      .quad-label {
        position: absolute;
        transform: translate(-50%, -8px);
        font-size: 12px;
        color: var(--ink);
        white-space: nowrap;
      }

      .balance-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .balance-item {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .balance-positive strong {
        color: var(--good);
      }

      .balance-negative strong {
        color: var(--bad);
      }

      .radar-shell {
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .radar-shell svg {
        width: min(100%, 280px);
        height: auto;
      }

      @media (max-width: 980px) {
        .topbar-inner,
        .page {
          width: min(1280px, calc(100vw - 20px));
        }

        .hero,
        .two-col,
        .card-grid.three,
        .card-grid.two,
        .chart-grid,
        .balance-grid {
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          grid-template-columns: 1fr;
          padding: 12px 0;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark" id="brand-mark"></div>
          <div class="brand-name" id="brand-name"></div>
        </div>
        <nav class="nav" id="top-nav">
          <a class="nav-link" data-target="overview" href="#overview"></a>
          <a class="nav-link" data-target="guide" href="#guide"></a>
          <a class="nav-link" data-target="environment" href="#environment"></a>
          <a class="nav-link" data-target="models" href="#models"></a>
          <a class="nav-link" data-target="charts" href="#charts"></a>
          <a class="nav-link" data-target="competition" href="#competition"></a>
          <a class="nav-link" data-target="ai" href="#ai"></a>
          <a class="nav-link" data-target="evidence" href="#evidence"></a>
          <a class="nav-link" data-target="methodology" href="#methodology"></a>
        </nav>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="zh" id="lang-zh">中文</button>
          <button class="lang-btn" data-lang="en" id="lang-en">EN</button>
        </div>
      </div>
    </header>

    <div class="page">
      <section class="hero anchor" id="overview">
        <div class="panel hero-main">
          <div class="eyebrow" id="hero-eyebrow"></div>
          <h1 id="report-title">Business Model Report</h1>
          <p class="subhead" id="report-subhead"></p>
          <div class="hero-meta" id="hero-meta"></div>
        </div>
        <div class="hero-side">
          <div class="panel kpi-grid" id="kpi-grid"></div>
        </div>
      </section>

      <section class="panel section anchor" id="guide">
        <div class="module-title">
          <div>
            <h2 id="guide-title"></h2>
            <p id="guide-subtitle"></p>
          </div>
        </div>
        <div class="section-grid two-col">
          <div>
            <h3 id="module-guide-title"></h3>
            <div class="card-grid two" id="module-guide-cards" style="margin-top: 12px;"></div>
          </div>
          <div>
            <h3 id="metric-guide-title"></h3>
            <div class="card-stack" id="metric-guide-cards" style="margin-top: 12px;"></div>
          </div>
        </div>
      </section>

      <div class="section-grid" style="margin-top: 18px;">
        <div class="section-grid two-col">
          <section class="panel section anchor" id="environment">
            <div class="module-title">
              <div>
                <h2 id="environment-title"></h2>
                <p id="environment-subtitle"></p>
              </div>
              <p id="direction-pill"></p>
            </div>
            <div id="environment-summary" class="section-note"></div>
            <div id="environment-scores" style="margin-top: 18px;"></div>
            <div style="margin-top: 18px;">
              <h3 id="constraints-title"></h3>
              <div class="chips" id="environment-constraints" style="margin-top: 10px;"></div>
            </div>
            <div style="margin-top: 18px;">
              <h3 id="opportunities-title"></h3>
              <div class="chips" id="environment-opportunities" style="margin-top: 10px;"></div>
            </div>
          </section>

          <section class="panel section" id="summary">
            <div class="module-title">
              <div>
                <h2 id="summary-title"></h2>
                <p id="summary-subtitle"></p>
              </div>
              <p id="analysis-mode"></p>
            </div>
            <div class="card-stack" id="summary-cards"></div>
          </section>
        </div>

        <section class="panel section anchor" id="models">
          <div class="module-title">
            <div>
              <h2 id="models-title"></h2>
              <p id="models-subtitle"></p>
            </div>
          </div>
          <div id="models-or-ideas"></div>
        </section>

        <section class="panel section" id="financial">
          <div class="module-title">
            <div>
              <h2 id="financial-title"></h2>
              <p id="financial-subtitle"></p>
            </div>
          </div>
          <div id="financial-view"></div>
        </section>

        <section class="panel section anchor" id="charts">
          <div class="module-title">
            <div>
              <h2 id="charts-title"></h2>
              <p id="charts-subtitle"></p>
            </div>
            <p id="charts-count"></p>
          </div>
          <div class="chart-grid" id="chart-modules"></div>
        </section>

        <section class="panel section anchor" id="competition">
          <div class="module-title">
            <div>
              <h2 id="competition-title"></h2>
              <p id="competition-subtitle"></p>
            </div>
          </div>
          <div class="section-grid two-col">
            <div>
              <h3 id="direct-title"></h3>
              <div id="direct-competitors" style="margin-top: 12px;"></div>
            </div>
            <div>
              <h3 id="analog-title"></h3>
              <div id="cross-analogs" style="margin-top: 12px;"></div>
            </div>
          </div>
        </section>

        <section class="panel section anchor" id="ai">
          <div class="module-title">
            <div>
              <h2 id="ai-title"></h2>
              <p id="ai-subtitle"></p>
            </div>
          </div>
          <div class="section-grid two-col">
            <div id="ai-fit"></div>
            <div id="recommendations"></div>
          </div>
        </section>

        <section class="panel section anchor" id="evidence">
          <div class="module-title">
            <div>
              <h2 id="evidence-title"></h2>
              <p id="evidence-subtitle"></p>
            </div>
          </div>
          <div class="section-grid two-col">
            <div id="evidence-map"></div>
            <div>
              <div id="risks"></div>
              <div style="margin-top: 18px;" id="next-actions"></div>
            </div>
          </div>
        </section>

        <section class="panel section anchor" id="methodology">
          <div class="module-title">
            <div>
              <h2 id="method-title"></h2>
              <p id="method-subtitle"></p>
            </div>
          </div>
          <div class="section-grid two-col">
            <div>
              <h3 id="principles-title"></h3>
              <div class="method-list" id="principles-list" style="margin-top: 12px;"></div>
            </div>
            <div>
              <h3 id="formula-title"></h3>
              <div class="card-stack" id="formula-list" style="margin-top: 12px;"></div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script id="report-json" type="application/json">{
  "analysis_mode": "model_diagnosis",
  "entity": {
    "input": "https://globalsupport.ai",
    "name": "GlobalSupport AI",
    "type": "private_company_or_product",
    "domain": "globalsupport.ai",
    "legal_name": "GlobalSupport AI Pte. Ltd.",
    "jurisdiction": "Singapore",
    "region": "China team serving global merchants",
    "confidence": 68.0,
    "confidence_band": "moderate_estimate"
  },
  "market_environment": {
    "company_origin": "china",
    "target_market": "overseas",
    "delivery_direction": "china_to_overseas",
    "primary_buyer": [
      "SMB",
      "merchant",
      "support_team"
    ],
    "payment_environment": [

      function safeArray(value) {
        return Array.isArray(value) ? value : [];

      function ui() {
        return UI[currentLang];
      }

      function fallbackText() {
        return ui().labels.notProvided;
      }

      function localize(value, fallback = "") {
        if (value && typeof value === "object" && !Array.isArray(value)) {
          if (currentLang === "zh" && value.zh) return String(value.zh);
          if (currentLang === "en" && value.en) return String(value.en);
          if (value.zh) return String(value.zh);
          if (value.en) return String(value.en);
        }
        if (value === null || value === undefined || value === "") return fallback;
        return String(value);
      }

      function looksLikeToken(value) {
        return typeof value === "string" && /^[A-Za-z0-9_]+$/.test(value);
      }

      function humanizeToken(value) {
        return String(value).replace(/_/g, " ");
      }

      function tokenLabel(value) {
        const raw = localize(value, "");
        if (!raw) return fallbackText();
        const maps = ui().maps.token || {};
        if (maps[raw]) return maps[raw];
        if (looksLikeToken(raw)) return humanizeToken(raw);
        return raw;
      }

      function mappedLabel(group, value, fallback = "") {
        const raw = localize(value, fallback);
        if (!raw) return fallback || fallbackText();
        const maps = ui().maps[group] || {};
        return maps[raw] || tokenLabel(raw);
      }

      function escapeHtml(value) {
        const string = localize(value, "");
        return string.replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[ch]);
      }

      function currencyRange(range) {
        if (!range) return fallbackText();
        const currency = localize(range.currency, "");
        return `${currency} ${range.low ?? "-"} / ${range.base ?? "-"} / ${range.high ?? "-"}`;
      }

      function labelClass(value) {
        const raw = localize(value, "").toLowerCase();
        if (raw === "low" || raw === "good") return "label-good";
        if (raw === "high" || raw === "critical" || raw === "bad") return "label-bad";
        return "label-warn";

        const list = safeArray(items);
        if (!list.length) return `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;
        return list.map((item) => {

          return `<span class="chip">${escapeHtml(text)}</span>`;

      function scoreBar(label, value) {
        const safeValue = Number.isFinite(Number(value)) ? Number(value) : 0;
        return `
          <div class="score-row">
            <div>${escapeHtml(label)}</div>
            <div class="scorebar"><span style="width:${Math.max(0, Math.min(100, safeValue))}%"></span></div>
            <div>${safeValue}</div>
          </div>
        `;
      }

      function formatCompactNumber(value, unit = "") {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return fallbackText();
        let display = "";
        const abs = Math.abs(numeric);
        if (unit === "%") {
          display = numeric.toFixed(1).replace(/\.0$/, "");
          return `${display}%`;
        }
        if (abs >= 1_000_000_000) {
          display = `${(numeric / 1_000_000_000).toFixed(2).replace(/\.00$/, "")}B`;
        } else if (abs >= 1_000_000) {
          display = `${(numeric / 1_000_000).toFixed(2).replace(/\.00$/, "")}M`;
        } else if (abs >= 1_000) {
          display = `${(numeric / 1_000).toFixed(1).replace(/\.0$/, "")}K`;
        } else {
          display = numeric.toFixed(abs % 1 === 0 ? 0 : 1);
        }
        return unit ? `${unit} ${display}` : display;
      }

      function chartIntensity(value) {
        const safeValue = Math.max(0, Math.min(100, Number(value) || 0));
        const alpha = 0.08 + safeValue / 140;
        return `rgba(17, 17, 17, ${alpha})`;
      }

          const value = Number(item.value) || 0;

          return `
            <div class="chart-bar-row">

              <div class="chart-track"><div class="chart-fill" style="width:${width}%"></div></div>
              <div class="chart-bar-value">${escapeHtml(formatCompactNumber(value, item.unit || ""))}</div>
            </div>

        }).join("")}</div>`;
      }

        return `<div class="timeline-grid">${items.map((item) => {

          const height = Math.max(18, (value / maxValue) * 140);
          return `
            <div class="timeline-item">

      function renderRangeBarChart(data = {}) {
        const items = safeArray(data.items);
        const maxHigh = Math.max(...items.map((item) => Number(item.high) || 0), 1);
        return `<div class="chart-bars">${items.map((item) => {
          const low = Number(item.low) || 0;
          const base = Number(item.base) || 0;
          const high = Number(item.high) || 0;
          const left = (low / maxHigh) * 100;
          const width = Math.max(2, ((high - low) / maxHigh) * 100);
          const baseLeft = (base / maxHigh) * 100;
          return `
            <div class="range-row">
              <div class="card-top">
                <div class="chart-bar-label">${escapeHtml(localize(item.label, fallbackText()))}</div>
                <div class="chart-bar-value">${escapeHtml(formatCompactNumber(base, item.unit || ""))}</div>
              </div>
              <div class="range-track">
                <div class="range-segment" style="left:${left}%; width:${width}%;"></div>
                <div class="range-base" style="left:${baseLeft}%;"></div>
              </div>
            </div>
          `;
        }).join("")}</div>`;
      }

      function renderStackedBarChart(data = {}) {
        const items = safeArray(data.items);
        const total = Number(data.total) || items.reduce((sum, item) => sum + (Number(item.value) || 0), 0);
        const palette = ["#111111", "#444444", "#6b7280", "#9ca3af", "#cbd5e1", "#e5e7eb"];
        return `
          <div class="stacked-track">
            ${items.map((item, index) => {
              const width = total ? Math.max(2, ((Number(item.value) || 0) / total) * 100) : 0;
              return `<div class="stacked-segment" style="width:${width}%; background:${palette[index % palette.length]};"></div>`;
            }).join("")}
          </div>
          <div class="chart-bars" style="margin-top:12px;">
            ${items.map((item, index) => `
              <div class="chart-bar-row">
                <div class="chart-bar-label">${escapeHtml(localize(item.label, fallbackText()))}</div>
                <div class="chart-track"><div class="chart-fill" style="width:${total ? ((Number(item.value) || 0) / total) * 100 : 0}%; background:${palette[index % palette.length]};"></div></div>
                <div class="chart-bar-value">${escapeHtml(total ? `${(((Number(item.value) || 0) / total) * 100).toFixed(1)}%` : "0%")}</div>
              </div>
            `).join("")}

      function renderRadarChart(data = {}) {
        const metrics = safeArray(data.metrics);
        if (!metrics.length) return `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;
        const size = 240;
        const center = size / 2;
        const radius = 78;
        const rings = [20, 40, 60, 80, 100];
        const axisLines = metrics.map((item, index) => {
          const angle = (Math.PI * 2 * index) / metrics.length - Math.PI / 2;
          const x = center + Math.cos(angle) * radius;
          const y = center + Math.sin(angle) * radius;
          return `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="#d9d9d9" stroke-width="1"></line>`;
        }).join("");
        const ringPolygons = rings.map((ring) => {
          const points = metrics.map((_, index) => {
            const angle = (Math.PI * 2 * index) / metrics.length - Math.PI / 2;
            const x = center + Math.cos(angle) * radius * (ring / 100);
            const y = center + Math.sin(angle) * radius * (ring / 100);
            return `${x},${y}`;
          }).join(" ");
          return `<polygon points="${points}" fill="none" stroke="#e5e7eb" stroke-width="1"></polygon>`;
        }).join("");
        const valuePolygon = metrics.map((item, index) => {
          const angle = (Math.PI * 2 * index) / metrics.length - Math.PI / 2;
          const value = Math.max(0, Math.min(100, Number(item.value) || 0));
          const x = center + Math.cos(angle) * radius * (value / 100);
          const y = center + Math.sin(angle) * radius * (value / 100);
          return `${x},${y}`;
        }).join(" ");
        const labels = metrics.map((item, index) => {
          const angle = (Math.PI * 2 * index) / metrics.length - Math.PI / 2;
          const x = center + Math.cos(angle) * (radius + 24);
          const y = center + Math.sin(angle) * (radius + 24);
          return `<text x="${x}" y="${y}" font-size="11" text-anchor="middle" fill="#5f6368">${escapeHtml(localize(item.label, fallbackText()))}</text>`;
        }).join("");
        return `
          <div class="radar-shell">
            <svg viewBox="0 0 ${size} ${size}">
              ${ringPolygons}
              ${axisLines}
              <polygon points="${valuePolygon}" fill="rgba(17,17,17,0.16)" stroke="#111111" stroke-width="2"></polygon>
              ${labels}
            </svg>
          </div>
        `;
      }

      function renderChartVisual(module) {
        const type = module.chart_type;
        if (type === "radar") return renderRadarChart(module.data);
        if (type === "heatmap") return renderHeatmapChart(module.data);
        if (type === "timeline") return renderTimelineChart(module.data);
        if (type === "range_bar") return renderRangeBarChart(module.data);
        if (type === "stacked_bar") return renderStackedBarChart(module.data);
        if (type === "gap_bar") return renderGapBarChart(module.data);
        if (type === "quadrant") return renderQuadrantChart(module.data);
        if (type === "balance") return renderBalanceChart(module.data);
        return renderRankedBarChart(module.data);
      }

        document.getElementById("direct-title").textContent = ui().directTitle;
        document.getElementById("analog-title").textContent = ui().analogTitle;
        renderCompetitorGroup("direct-competitors", report.direct_competitors, ui().labels.noItems);
        renderCompetitorGroup("cross-analogs", report.cross_industry_analogs, ui().labels.noItems);
      }

      function renderAiAndRecommendations() {
        const ai = report.ai_fit || {};
        document.getElementById("ai-title").textContent = ui().aiTitle;
        document.getElementById("ai-subtitle").textContent = ui().aiSubtitle;
        document.getElementById("ai-fit").innerHTML = `
          <div class="card">
            <div class="card-top">
              <h3>${escapeHtml(mappedLabel("ai_role", ai.role, fallbackText()))}</h3>
              <span class="label ${labelClass("warn")}">${escapeHtml(tokenLabel(ai.pricing_implication || fallbackText()))}</span>
            </div>
            <div class="section-note" style="margin-top:10px;">${escapeHtml(localize(ai.summary, fallbackText()))}</div>
            <div style="margin-top:14px;">
              <h4>${escapeHtml(ui().labels.leverage)}</h4>
              <div class="chips" style="margin-top:10px;">${chips(ai.leverage_points)}</div>
            </div>
            <div style="margin-top:14px;">
              <h4>${escapeHtml(ui().labels.disruption)}</h4>
              <div class="chips" style="margin-top:10px;">${chips(ai.disruption_risks)}</div>
            </div>
          </div>
        `;

        const recs = safeArray(report.upgrade_recommendations);
        if (!recs.length) {
          document.getElementById("recommendations").innerHTML = `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;
          return;
        }
        document.getElementById("recommendations").innerHTML = recs.slice(0, 6).map((item) => `
          <div class="card" style="margin-bottom:12px;">
            <div class="card-top">
              <h3>${escapeHtml(localize(item.title, fallbackText()))}</h3>
              <span class="label ${labelClass(item.risk > 70 ? "bad" : "warn")}">${escapeHtml(item.impact)} / 100</span>
            </div>
            <div class="muted" style="margin-top:8px;">${escapeHtml(tokenLabel(item.mechanism || fallbackText()))}</div>
            <div style="margin-top:10px;"><strong>${escapeHtml(ui().labels.formula)}:</strong> ${escapeHtml(localize(item.formula, fallbackText()))}</div>
            <div style="margin-top:10px;"><strong>${escapeHtml(ui().labels.validation)}:</strong> ${escapeHtml(localize(item.validation, fallbackText()))}</div>
          </div>
        `).join("");
      }

      function renderEvidence() {
        document.getElementById("evidence-title").textContent = ui().evidenceTitle;
        document.getElementById("evidence-subtitle").textContent = ui().evidenceSubtitle;
        const evidence = safeArray(report.evidence_items);
        if (!evidence.length) {
          document.getElementById("evidence-map").innerHTML = `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;
          return;
        }
        document.getElementById("evidence-map").innerHTML = `
          <table>
            <thead>
              <tr>
                <th>${escapeHtml(ui().labels.claim)}</th>
                <th>${escapeHtml(ui().labels.tier)}</th>
                <th>${escapeHtml(ui().labels.date)}</th>
              </tr>
            </thead>
            <tbody>
              ${evidence.slice(0, 12).map((item) => `
                <tr>
                  <td>${escapeHtml(localize(item.claim, fallbackText()))}</td>
                  <td>${escapeHtml(localize(item.source_tier, fallbackText()))}</td>
                  <td>${escapeHtml(localize(item.source_date, fallbackText()))}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      function renderRisksAndNextActions() {
        const risks = safeArray(report.risk_flags);
        document.getElementById("risks").innerHTML = risks.length ? risks.map((risk) => `
          <div class="card" style="margin-bottom:12px;">
            <div class="card-top">
              <h3>${escapeHtml(tokenLabel(risk.type || fallbackText()))}</h3>
              <span class="label ${labelClass(risk.severity)}">${escapeHtml(mappedLabel("severity", risk.severity, fallbackText()))}</span>
            </div>
            <div class="section-note" style="margin-top:8px;">${escapeHtml(localize(risk.safe_control, fallbackText()))}</div>
          </div>
        `).join("") : `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;

        const next = safeArray(report.next_validation);
        document.getElementById("next-actions").innerHTML = next.length ? `
          <h3>${escapeHtml(ui().labels.nextActions)}</h3>
          <div class="card-stack" style="margin-top: 12px;">
            ${next.map((item) => `
              <div class="card">
                <strong>${escapeHtml(localize(item.title, fallbackText()))}</strong>
                <div class="section-note" style="margin-top:8px;">${escapeHtml(localize(item.success_signal, fallbackText()))}</div>
              </div>
            `).join("")}
          </div>
        ` : `<div class="empty">${escapeHtml(ui().labels.noItems)}</div>`;
      }

      function renderMethodology() {
        document.getElementById("method-title").textContent = ui().methodTitle;
        document.getElementById("method-subtitle").textContent = ui().methodSubtitle;
        document.getElementById("principles-title").textContent = ui().principlesTitle;
        document.getElementById("formula-title").textContent = ui().formulaTitle;
        document.getElementById("principles-list").innerHTML = ui().principles.map((item) => `
          <div class="method-item">
            <h3>${escapeHtml(item.title)}</h3>
            <div class="section-note" style="margin-top:8px;">${escapeHtml(item.body)}</div>
          </div>
        `).join("");
        const formulas = reportFormulas.length ? reportFormulas : [ui().fallbackFormula];
        document.getElementById("formula-list").innerHTML = formulas.map((formula) => `
          <div class="formula-box">${escapeHtml(localize(formula, fallbackText()))}</div>
        `).join("");
      }

      function bindLanguageToggle() {
        document.querySelectorAll(".lang-btn").forEach((button) => {
          button.addEventListener("click", () => {
            currentLang = button.dataset.lang;
            renderApp();
          });
        });
      }

      function bindScrollSpy() {
        const links = [...document.querySelectorAll(".nav-link")];
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            links.forEach((link) => link.classList.toggle("active", link.dataset.target === entry.target.id));
          });
        }, {
          rootMargin: "-25% 0px -60% 0px",
          threshold: 0.01
        });

        links.forEach((link) => {
          const section = document.getElementById(link.dataset.target);
          if (section) observer.observe(section);
        });
      }

      function renderApp() {
        renderChrome();
        renderHero();
        renderKpis();
        renderGuide();
        renderEnvironment();
        renderSummary();
        renderModelsOrIdeas();
        renderFinancials();
        renderCharts();
        renderCompetition();
        renderAiAndRecommendations();
        renderEvidence();
        renderRisksAndNextActions();
        renderMethodology();
      }

      bindLanguageToggle();
      bindScrollSpy();
      renderApp();
    </script>
  </body>
</html>
